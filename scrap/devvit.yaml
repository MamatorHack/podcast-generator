name: podcastscrapper
blocks:
  entry: src/main.ts
permissions:
  - posts
  - comments
  - read
  - modposts  
  - submit
  - http:
      enable: true
      domains:
        - api.github.com
allowExternal:
  - eoyziuzxbs5ho1w.m.pipedream.net
settings:
  - name: GITHUB_TOKEN
    label: GitHub Token
    type: string
    scope: installation
    secret: true

  - name: GITHUB_REPO
    label: GitHub Repo (owner/repo)
    type: string
    scope: installation